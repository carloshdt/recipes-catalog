<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caderno de Receitas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1E9D9;
    --card:#FCF8F0;
    --ink:#352A20;
    --ink-soft:#7A6C58;
    --line:#E3D7C0;
    --line-soft:#EDE4D2;
    --salgada:#A8622B;
    --doce:#B14A6B;
    --caseira:#5E7C4E;
    --junk:#CF4A2C;
    --shadow:0 1px 2px rgba(53,42,32,.06),0 8px 24px rgba(53,42,32,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;padding:0 0 96px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit}

  /* ---------- Cabeçalho ---------- */
  .topbar{position:sticky;top:0;z-index:20;background:rgba(241,233,217,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .topbar-inner{max-width:1080px;margin:0 auto;padding:18px 20px 16px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:30px;line-height:1;letter-spacing:-.01em}
  .brand p{color:var(--ink-soft);font-size:13.5px;margin-top:6px}
  .count-badge{font-family:'Fraunces',serif;font-size:13px;color:var(--ink-soft);border:1px solid var(--line);border-radius:999px;padding:5px 12px;background:var(--card)}

  /* ---------- Barra de controles ---------- */
  .controls{max-width:1080px;margin:0 auto;padding:18px 20px 4px;display:flex;flex-direction:column;gap:14px}
  .searchrow{display:flex;gap:10px;align-items:center}
  .search{flex:1;position:relative}
  .search input{width:100%;padding:12px 14px 12px 40px;border:1px solid var(--line);border-radius:12px;background:var(--card);font-size:15px;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s}
  .search input:focus{border-color:var(--salgada);box-shadow:0 0 0 3px rgba(168,98,43,.12)}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-soft)}
  .add-btn{white-space:nowrap;background:var(--ink);color:#FCF8F0;font-weight:600;font-size:14.5px;padding:12px 18px;border-radius:12px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);transition:transform .12s,opacity .15s}
  .add-btn:hover{transform:translateY(-1px)}
  .add-btn:active{transform:translateY(0)}

  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-size:13px;font-weight:500;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);transition:all .14s}
  .chip[data-on="1"]{color:#FCF8F0;border-color:transparent}
  .chip:not([data-on="1"]):hover{border-color:var(--ink-soft);color:var(--ink)}

  /* ---------- Grade ---------- */
  .grid{max-width:1080px;margin:0 auto;padding:22px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .14s,box-shadow .14s;display:flex;flex-direction:column}
  .rcard:hover{transform:translateY(-3px);box-shadow:0 2px 4px rgba(53,42,32,.08),0 16px 34px rgba(53,42,32,.13)}
  .rcard-art{height:130px;display:flex;align-items:center;justify-content:center;position:relative;border-bottom:1px solid rgba(255,255,255,.4)}
  .rcard-art .emoji{font-size:56px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.18))}
  .rcard-art img{width:100%;height:100%;object-fit:cover;display:block}
  .rcard-art .time{position:absolute;bottom:8px;right:8px;font-size:11px;font-weight:600;color:var(--ink);background:rgba(252,248,240,.9);padding:3px 8px;border-radius:999px}
  .rcard-body{padding:13px 14px 15px}
  .rcard-body h3{font-family:'Fraunces',serif;font-weight:600;font-size:17px;line-height:1.2;letter-spacing:-.01em}
  .rcard-tags{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px}

  /* ---------- Estado vazio ---------- */
  .empty{max-width:520px;margin:60px auto;text-align:center;padding:0 24px}
  .empty .big{font-size:52px;margin-bottom:8px}
  .empty h2{font-family:'Fraunces',serif;font-weight:600;font-size:24px;margin-bottom:8px}
  .empty p{color:var(--ink-soft);font-size:15px;line-height:1.55;margin-bottom:22px}

  /* ---------- Overlay / modais ---------- */
  .overlay{position:fixed;inset:0;background:rgba(40,31,22,.42);backdrop-filter:blur(3px);z-index:40;display:flex;align-items:flex-start;justify-content:center;padding:28px 16px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .18s}
  .overlay[data-open="1"]{opacity:1;pointer-events:auto}
  .sheet{background:var(--paper);width:100%;max-width:640px;border-radius:20px;box-shadow:0 24px 60px rgba(30,22,14,.34);overflow:hidden;transform:translateY(10px);transition:transform .2s}
  .overlay[data-open="1"] .sheet{transform:translateY(0)}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
  .sheet-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:20px}
  .xbtn{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:background .14s}
  .xbtn:hover{background:var(--line-soft)}
  .sheet-body{padding:22px}

  label.fld{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:7px}
  textarea.paste{width:100%;min-height:150px;padding:13px;border:1px solid var(--line);border-radius:12px;background:var(--card);font-size:14.5px;line-height:1.55;color:var(--ink);outline:none;resize:vertical}
  textarea.paste:focus{border-color:var(--salgada);box-shadow:0 0 0 3px rgba(168,98,43,.12)}
  .hint{font-size:12.5px;color:var(--ink-soft);margin-top:8px;line-height:1.5}
  .primary{width:100%;margin-top:16px;background:var(--salgada);color:#FCF8F0;font-weight:600;font-size:15px;padding:13px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:9px;transition:opacity .15s,transform .12s}
  .primary:hover{transform:translateY(-1px)}
  .primary:disabled{opacity:.55;cursor:default;transform:none}
  .ghost{width:100%;margin-top:10px;background:var(--card);border:1px solid var(--line);color:var(--ink-soft);font-weight:500;font-size:14px;padding:11px;border-radius:12px}
  .ghost:hover{border-color:var(--ink-soft);color:var(--ink)}

  /* preview de edição */
  .in{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);font-size:14.5px;color:var(--ink);outline:none}
  .in:focus{border-color:var(--salgada);box-shadow:0 0 0 3px rgba(168,98,43,.12)}
  .rowlbl{font-size:13px;font-weight:600;color:var(--ink-soft);margin:16px 0 7px}
  .emoji-pick{display:flex;align-items:center;gap:10px}
  .emoji-pick input{width:64px;text-align:center;font-size:24px;padding:8px}
  .seg{display:flex;gap:8px;flex-wrap:wrap}
  .seg button{font-size:13.5px;font-weight:500;padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft)}
  .seg button[data-on="1"]{color:#FCF8F0;border-color:transparent;background:var(--ink)}
  .list-edit{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .list-edit li{display:flex;gap:8px;align-items:flex-start}
  .list-edit textarea{flex:1;min-height:38px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:var(--card);font-size:14px;line-height:1.45;color:var(--ink);outline:none;resize:vertical;font-family:inherit}
  .list-edit .del{color:var(--ink-soft);padding:6px;flex-shrink:0}
  .list-edit .del:hover{color:var(--junk)}
  .add-line{font-size:13px;font-weight:600;color:var(--salgada);margin-top:9px;display:inline-flex;align-items:center;gap:5px}

  /* detalhe */
  .detail-hero{height:150px;display:flex;align-items:center;justify-content:center}
  .detail-hero .emoji{font-size:74px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.2))}
  .detail-hero img{width:100%;height:100%;object-fit:cover;display:block}
  .detail-hero.has-img{height:220px}
  .detail-meta{padding:20px 22px 0}
  .detail-meta h2{font-family:'Fraunces',serif;font-weight:600;font-size:26px;letter-spacing:-.01em;line-height:1.15}
  .detail-meta .tags{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap;align-items:center}
  .detail-section{padding:0 22px}
  .detail-section h4{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin:22px 0 11px;display:flex;align-items:center;gap:9px}
  .detail-section h4::before{content:"";width:20px;height:2px;background:var(--salgada);border-radius:2px}
  ul.ing{list-style:none;display:flex;flex-direction:column;gap:7px}
  ul.ing li{display:flex;gap:10px;align-items:flex-start;font-size:14.5px;line-height:1.5}
  ul.ing li::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--salgada);margin-top:8px;flex-shrink:0}
  ol.steps{list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:12px}
  ol.steps li{counter-increment:s;display:flex;gap:12px;font-size:14.5px;line-height:1.55}
  ol.steps li::before{content:counter(s);flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--ink);color:#FCF8F0;font-size:12.5px;font-weight:600;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif}
  .detail-actions{display:flex;gap:10px;padding:24px 22px 22px}
  .detail-actions button{flex:1;padding:11px;border-radius:11px;font-weight:600;font-size:14px}
  .btn-edit{background:var(--card);border:1px solid var(--line);color:var(--ink)}
  .btn-edit:hover{border-color:var(--ink-soft)}
  .btn-del{background:rgba(207,74,44,.1);color:var(--junk)}
  .btn-del:hover{background:rgba(207,74,44,.16)}

  .spinner{width:17px;height:17px;border:2.5px solid rgba(252,248,240,.4);border-top-color:#FCF8F0;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-page{max-width:1080px;margin:0 auto;padding:40px 20px;text-align:center;color:var(--ink-soft);font-size:14px}

  .err{background:rgba(207,74,44,.1);color:var(--junk);font-size:13px;padding:10px 12px;border-radius:10px;margin-top:12px;line-height:1.45}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#FCF8F0;font-size:14px;font-weight:500;padding:12px 20px;border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,.28);z-index:60;opacity:0;pointer-events:none;transition:all .22s}
  .toast[data-show="1"]{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:560px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px}
    .rcard-art{height:104px}
    .rcard-art .emoji{font-size:44px}
    .brand h1{font-size:25px}
    .add-btn span{display:none}
    .add-btn{padding:12px 14px}
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <h1>Caderno de Receitas</h1>
        <p>As receitas que eu sei fazer — organizadas de um jeito fácil de bater o olho.</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="count-badge" id="countBadge">0 receitas</div>
        <button class="count-badge" id="dlBtn" title="Baixa o receitas.json atualizado pra publicar no GitHub Pages">⬇ Baixar JSON</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="searchrow">
      <div class="search">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="Buscar por nome ou ingrediente…">
      </div>
      <button class="add-btn" id="openAdd">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
        <span>Nova receita</span>
      </button>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div id="content"></div>

  <!-- ---------- Modal: adicionar / organizar ---------- -->
  <div class="overlay" id="addOverlay">
    <div class="sheet">
      <div class="sheet-head">
        <h2 id="addTitle">Nova receita</h2>
        <button class="xbtn" data-close="addOverlay"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="sheet-body" id="addBody"></div>
    </div>
  </div>

  <!-- ---------- Modal: detalhe ---------- -->
  <div class="overlay" id="detailOverlay">
    <div class="sheet">
      <div class="sheet-head">
        <h2>Receita</h2>
        <button class="xbtn" data-close="detailOverlay"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="sheet-body" style="padding:0" id="detailBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
let recipes=[];
let filters={categoria:null,fit:false};
let search='';
let draft=null;         // receita em edição no modal
let editingId=null;     // id se estiver editando existente

const CATS={
  'Lanches':            {c:'#A8622B',g:['#EBC98F','#C98A4E']},
  'Salgados':           {c:'#C25A28',g:['#F2B08A','#D06A3A']},
  'Massas':             {c:'#A5801F',g:['#F0D080','#C9A23E']},
  'Carnes e frango':    {c:'#96522F',g:['#E0A88A','#B06A45']},
  'Sopas e caldos':     {c:'#A3703F',g:['#F0C9A0','#C98E5E']},
  'Bolos e tortas':     {c:'#B14A6B',g:['#F0C2D4','#C77E9C']},
  'Doces e sobremesas': {c:'#8E5185',g:['#E8C0E0','#B57BA8']},
  'Bebidas':            {c:'#3E7A8C',g:['#B8D8E0','#6FA8B8']}
};
const FIT={c:'#5E7C4E',bg:'rgba(94,124,78,.15)'};
function grad(cat){const g=(CATS[cat]||CATS['Lanches']).g;return `linear-gradient(135deg,${g[0]} 0%,${g[1]} 100%)`;}
function tagsHTML(r){
  const cc=(CATS[r.categoria]||CATS['Lanches']).c;
  let h=`<span class="tag" style="background:${cc}22;color:${cc}">${esc(r.categoria||'Lanches')}</span>`;
  if(r.fit)h+=`<span class="tag" style="background:${FIT.bg};color:${FIT.c}">🌱 Fit</span>`;
  return h;
}

/* ---------------- Storage: receitas em receitas.json no repositório ---------------- */
async function loadRecipes(){
  try{
    const r=await fetch('receitas.json?v='+Date.now());
    if(!r.ok)throw new Error('http '+r.status);
    recipes=await r.json();
  }catch(e){ recipes=[]; }
}
async function saveRecipes(){
  toast('Salvo nesta aba — baixa o receitas.json e sobe no GitHub pra valer em todo lugar 📥');
}
function downloadJSON(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(recipes,null,1)],{type:'application/json'}));
  a.download='receitas.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('receitas.json baixado — troca no repositório e dá push');
}
document.getElementById('dlBtn').addEventListener('click',downloadJSON);

/* ---------------- Helpers ---------------- */
const el=(id)=>document.getElementById(id);
function toast(msg){
  const t=el('toast');t.textContent=msg;t.dataset.show='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.dataset.show='0',2200);
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function openOverlay(id){el(id).dataset.open='1';document.body.style.overflow='hidden';}
function closeOverlay(id){el(id).dataset.open='0';document.body.style.overflow='';}

/* ---------------- Render grade ---------------- */
function render(){
  el('countBadge').textContent=recipes.length+(recipes.length===1?' receita':' receitas');
  const c=el('content');
  let list=recipes.filter(r=>{
    if(filters.categoria&&r.categoria!==filters.categoria)return false;
    if(filters.fit&&!r.fit)return false;
    if(search){
      const q=search.toLowerCase();
      const inName=r.titulo.toLowerCase().includes(q);
      const inIng=(r.ingredientes||[]).some(i=>i.toLowerCase().includes(q));
      if(!inName&&!inIng)return false;
    }
    return true;
  });

  if(recipes.length===0){
    c.innerHTML=`<div class="empty">
      <div class="big">🍳</div>
      <h2>Seu caderno está em branco</h2>
      <p>Cola o texto de uma receita — de um site, de um print ou direto da sua cabeça — e eu organizo em ingredientes e modo de preparo pra você. As tags e a figurinha saem automáticas.</p>
      <button class="add-btn" style="margin:0 auto" onclick="openAdd()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
        <span>Adicionar primeira receita</span></button>
    </div>`;
    return;
  }
  if(list.length===0){
    c.innerHTML=`<div class="empty"><div class="big">🔎</div><h2>Nada por aqui</h2><p>Nenhuma receita bate com esse filtro ou busca. Ajusta os critérios pra ver mais.</p></div>`;
    return;
  }

  c.innerHTML=`<div class="grid">`+list.map(r=>`
    <div class="rcard" onclick="openDetail('${r.id}')">
      <div class="rcard-art" style="background:${grad(r.categoria)}">
        ${r.imagem?`<img src="${esc(r.imagem)}" alt="${esc(r.titulo)}" loading="lazy">`:`<span class="emoji">${r.emoji||'🍽️'}</span>`}
        ${r.tempo||r.calorias?`<span class="time">${r.tempo?'⏱ '+esc(r.tempo):'🔥 '+esc(r.calorias)}</span>`:''}
      </div>
      <div class="rcard-body">
        <h3>${esc(r.titulo)}</h3>
        <div class="rcard-tags">${tagsHTML(r)}</div>
      </div>
    </div>`).join('')+`</div>`;
}

/* ---------------- Filtros ---------------- */
function renderChips(){
  el('chips').innerHTML=Object.keys(CATS).map(c=>{
    const on=filters.categoria===c;
    return `<button class="chip" data-cat="${c}" data-on="${on?'1':''}" style="${on?`background:${CATS[c].c}`:''}">${c}</button>`;
  }).join('')
  +`<button class="chip" data-fit="1" data-on="${filters.fit?'1':''}" style="${filters.fit?`background:${FIT.c}`:''}">🌱 Fit</button>`;
}
el('chips').addEventListener('click',e=>{
  const b=e.target.closest('.chip');if(!b)return;
  if(b.dataset.fit)filters.fit=!filters.fit;
  else filters.categoria=filters.categoria===b.dataset.cat?null:b.dataset.cat;
  renderChips();render();
});
el('searchInput').addEventListener('input',e=>{search=e.target.value;render();});

/* ---------------- Fluxo de adicionar ---------------- */
el('openAdd').addEventListener('click',openAdd);
function openAdd(){
  draft=null;editingId=null;
  el('addTitle').textContent='Nova receita';
  el('addBody').innerHTML=pasteStageHTML();
  bindPasteStage();
  openOverlay('addOverlay');
}
function pasteStageHTML(){
  return `
    <label class="fld">Cola a receita aqui</label>
    <textarea class="paste" id="pasteArea" placeholder="Cola o texto da receita — pode ser bagunçado, do jeito que veio do site ou do WhatsApp. Ou escreve de cabeça mesmo."></textarea>
    <p class="hint">Vou separar em ingredientes e modo de preparo, sugerir a categoria (Lanches, Massas, Bolos e tortas…), marcar Fit se for leve e escolher uma figurinha. Você confere e ajusta antes de salvar.</p>
    <button class="primary" id="organizeBtn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>Organizar receita</button>
    <button class="ghost" id="manualBtn">Preencher na mão</button>
    <div id="pasteErr"></div>`;
}
function bindPasteStage(){
  el('organizeBtn').addEventListener('click',organize);
  el('manualBtn').addEventListener('click',()=>{
    draft={titulo:'',ingredientes:[''],modo:[''],categoria:'Lanches',fit:false,emoji:'🍽️',tempo:'',porcoes:'',calorias:''};
    renderEditStage();
  });
}

async function organize(){
  const txt=el('pasteArea').value.trim();
  if(!txt){el('pasteErr').innerHTML='<div class="err">Cola ou escreve alguma coisa primeiro 🙂</div>';return;}
  const btn=el('organizeBtn');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div>Organizando…';
  el('pasteErr').innerHTML='';
  try{
    const parsed=await parseRecipe(txt);
    draft={
      titulo:parsed.titulo||'',
      ingredientes:(parsed.ingredientes&&parsed.ingredientes.length)?parsed.ingredientes:[''],
      modo:(parsed.modo&&parsed.modo.length)?parsed.modo:[''],
      categoria:CATS[parsed.categoria]?parsed.categoria:'Lanches',
      fit:parsed.fit===true,
      emoji:parsed.emoji||'🍽️',
      tempo:parsed.tempo||'',
      porcoes:parsed.porcoes||'',
      calorias:parsed.calorias||''
    };
    renderEditStage();
  }catch(e){
    btn.disabled=false;
    btn.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>Organizar receita';
    el('pasteErr').innerHTML='<div class="err">Não consegui organizar automaticamente agora. Você pode tentar de novo ou preencher na mão.</div>';
  }
}

async function parseRecipe(text){
  const sys=`Você organiza receitas de cozinha. Recebe um texto bruto (possivelmente bagunçado, de site, print ou memória) e devolve APENAS um objeto JSON válido, sem markdown, sem crases, sem explicação. Formato exato:
{"titulo": string, "ingredientes": [string], "modo": [string], "categoria": string, "fit": boolean, "emoji": string, "tempo": string, "porcoes": string, "calorias": string}
Regras:
- "titulo": nome curto e claro do prato.
- "ingredientes": um item por elemento, com quantidade quando houver.
- "modo": passos objetivos, um passo por elemento, sem numeração no texto.
- "categoria": exatamente uma de: "Lanches", "Salgados", "Massas", "Carnes e frango", "Sopas e caldos", "Bolos e tortas", "Doces e sobremesas", "Bebidas".
- "fit": true apenas se a receita for claramente leve/saudável (ingredientes light, assado em vez de frito, poucas calorias); senão false.
- "emoji": um único emoji de comida que represente o prato.
- "tempo": estimativa curta tipo "40 min" se der pra inferir, senão "".
- "porcoes": número de porções que a receita rende, se der pra inferir, senão "".
- "calorias": estimativa aproximada de calorias por porção, tipo "210 kcal", com base nos ingredientes; se não der pra estimar com confiança, deixe "".
Responda em português. Apenas o JSON.`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
      messages:[{role:"user",content:sys+"\n\n---- TEXTO ----\n"+text}]})
  });
  if(!res.ok)throw new Error('api');
  const data=await res.json();
  let out=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
  out=out.replace(/```json/gi,'').replace(/```/g,'').trim();
  const s=out.indexOf('{'),e=out.lastIndexOf('}');
  if(s>=0&&e>=0)out=out.slice(s,e+1);
  return JSON.parse(out);
}

/* ---------------- Estágio de edição/confirmação ---------------- */
function renderEditStage(){
  el('addTitle').textContent=editingId?'Editar receita':'Confira e salve';
  const d=draft;
  el('addBody').innerHTML=`
    <label class="fld">Nome</label>
    <input class="in" id="fTitulo" value="${esc(d.titulo)}" placeholder="Nome do prato">

    <div style="display:flex;gap:18px;margin-top:16px;flex-wrap:wrap">
      <div>
        <div class="rowlbl">Figurinha</div>
        <div class="emoji-pick"><input class="in" id="fEmoji" value="${esc(d.emoji)}" maxlength="4"></div>
      </div>
      <div style="flex:1;min-width:150px">
        <div class="rowlbl">Tempo (opcional)</div>
        <input class="in" id="fTempo" value="${esc(d.tempo)}" placeholder="ex.: 30 min">
      </div>
    </div>

    <div style="display:flex;gap:18px;margin-top:16px;flex-wrap:wrap">
      <div style="flex:1;min-width:130px">
        <div class="rowlbl">Porções</div>
        <input class="in" id="fPorcoes" value="${esc(d.porcoes||'')}" placeholder="ex.: 10">
      </div>
      <div style="flex:1;min-width:150px">
        <div class="rowlbl">Calorias/porção (estim.)</div>
        <input class="in" id="fCalorias" value="${esc(d.calorias||'')}" placeholder="ex.: 210 kcal">
      </div>
    </div>

    <div class="rowlbl">Categoria</div>
    <div class="seg" id="segCat">
      ${Object.keys(CATS).map(c=>`<button data-v="${c}" data-on="${d.categoria===c?'1':''}">${c}</button>`).join('')}
    </div>
    <div class="rowlbl">Fit</div>
    <div class="seg" id="segFit">
      <button data-on="${d.fit?'1':''}">🌱 Fit</button>
    </div>

    <div class="rowlbl">Ingredientes</div>
    <ul class="list-edit" id="listIng"></ul>
    <button class="add-line" id="addIng">+ ingrediente</button>

    <div class="rowlbl">Modo de preparo</div>
    <ul class="list-edit" id="listModo"></ul>
    <button class="add-line" id="addModo">+ passo</button>

    <button class="primary" id="saveBtn" style="background:var(--ink)"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20 6 9 17l-5-5"/></svg>${editingId?'Salvar alterações':'Salvar no caderno'}</button>
    <button class="ghost" id="backBtn">${editingId?'Cancelar':'Voltar'}</button>`;

  // segmentos
  el('segCat').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;draft.categoria=b.dataset.v;[...el('segCat').children].forEach(x=>x.dataset.on=x.dataset.v===draft.categoria?'1':'');});
  el('segFit').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;draft.fit=!draft.fit;b.dataset.on=draft.fit?'1':'';});

  renderLines('listIng',draft.ingredientes,'addIng','ingrediente');
  renderLines('listModo',draft.modo,'addModo','passo');

  el('saveBtn').addEventListener('click',saveDraft);
  el('backBtn').addEventListener('click',()=>{
    if(editingId){openDetail(editingId);}
    else{el('addTitle').textContent='Nova receita';el('addBody').innerHTML=pasteStageHTML();bindPasteStage();}
  });
}

function renderLines(listId,arr,addBtnId,word){
  const ul=el(listId);
  ul.innerHTML=arr.map((v,i)=>`<li>
    <textarea data-i="${i}">${esc(v)}</textarea>
    <button class="del" data-i="${i}" title="Remover"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button>
  </li>`).join('');
  ul.querySelectorAll('textarea').forEach(t=>t.addEventListener('input',e=>{arr[+e.target.dataset.i]=e.target.value;}));
  ul.querySelectorAll('.del').forEach(b=>b.addEventListener('click',e=>{
    arr.splice(+e.currentTarget.dataset.i,1);if(arr.length===0)arr.push('');renderLines(listId,arr,addBtnId,word);
  }));
  el(addBtnId).onclick=()=>{arr.push('');renderLines(listId,arr,addBtnId,word);};
}

async function saveDraft(){
  draft.titulo=el('fTitulo').value.trim();
  draft.emoji=el('fEmoji').value.trim()||'🍽️';
  draft.tempo=el('fTempo').value.trim();
  draft.porcoes=el('fPorcoes').value.trim();
  draft.calorias=el('fCalorias').value.trim();
  draft.ingredientes=draft.ingredientes.map(s=>s.trim()).filter(Boolean);
  draft.modo=draft.modo.map(s=>s.trim()).filter(Boolean);
  if(!draft.titulo){toast('Dá um nome pra receita 🙂');return;}

  if(editingId){
    const idx=recipes.findIndex(r=>r.id===editingId);
    if(idx>=0)recipes[idx]={...recipes[idx],...draft};
    toast('Receita atualizada');
  }else{
    recipes.unshift({id:'r'+Date.now()+Math.random().toString(36).slice(2,6),...draft,criadoEm:Date.now()});
    toast('Salva no caderno 📖');
  }
  await saveRecipes();
  closeOverlay('addOverlay');
  render();
}

/* ---------------- Detalhe ---------------- */
function openDetail(id){
  const r=recipes.find(x=>x.id===id);if(!r)return;
  el('detailBody').innerHTML=`
    <div class="detail-hero${r.imagem?' has-img':''}" style="background:${grad(r.categoria)}">${r.imagem?`<img src="${esc(r.imagem)}" alt="${esc(r.titulo)}">`:`<span class="emoji">${r.emoji||'🍽️'}</span>`}</div>
    <div class="detail-meta">
      <h2>${esc(r.titulo)}</h2>
      <div class="tags">
        ${tagsHTML(r)}
        ${r.tempo?`<span style="font-size:13px;color:var(--ink-soft)">⏱ ${esc(r.tempo)}</span>`:''}
        ${r.porcoes?`<span style="font-size:13px;color:var(--ink-soft)">🍽 ${esc(r.porcoes)} porções</span>`:''}
        ${r.calorias?`<span style="font-size:13px;color:var(--ink-soft)">🔥 ${esc(r.calorias)}/porção</span>`:''}
      </div>
    </div>
    <div class="detail-section">
      <h4>Ingredientes</h4>
      <ul class="ing">${(r.ingredientes||[]).map(i=>`<li>${esc(i)}</li>`).join('')||'<li>—</li>'}</ul>
      <h4>Modo de preparo</h4>
      <ol class="steps">${(r.modo||[]).map(s=>`<li>${esc(s)}</li>`).join('')||'<li>—</li>'}</ol>
    </div>
    <div class="detail-actions">
      <button class="btn-edit" onclick="editRecipe('${r.id}')">Editar</button>
      <button class="btn-del" onclick="delRecipe('${r.id}')">Apagar</button>
    </div>`;
  openOverlay('detailOverlay');
}
function editRecipe(id){
  const r=recipes.find(x=>x.id===id);if(!r)return;
  editingId=id;
  draft={titulo:r.titulo,ingredientes:[...(r.ingredientes||[''])],modo:[...(r.modo||[''])],categoria:r.categoria||'Lanches',fit:!!r.fit,emoji:r.emoji,tempo:r.tempo||'',porcoes:r.porcoes||'',calorias:r.calorias||''};
  if(draft.ingredientes.length===0)draft.ingredientes=[''];
  if(draft.modo.length===0)draft.modo=[''];
  closeOverlay('detailOverlay');
  renderEditStage();
  openOverlay('addOverlay');
}
async function delRecipe(id){
  const r=recipes.find(x=>x.id===id);
  if(!confirm(`Apagar "${r?r.titulo:'esta receita'}"? Isso não dá pra desfazer.`))return;
  recipes=recipes.filter(x=>x.id!==id);
  await saveRecipes();
  closeOverlay('detailOverlay');
  render();
  toast('Receita apagada');
}

/* ---------------- Fechar overlays ---------------- */
document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',()=>closeOverlay(b.dataset.close)));
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeOverlay(o.id);}));
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeOverlay('addOverlay');closeOverlay('detailOverlay');}});

/* ---------------- Boot ---------------- */
(async()=>{
  el('content').innerHTML='<div class="loading-page">Abrindo seu caderno…</div>';
  renderChips();
  await loadRecipes();
  render();
})();
window.openAdd=openAdd;window.openDetail=openDetail;window.editRecipe=editRecipe;window.delRecipe=delRecipe;
</script>
